<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Énigme 5 — JeuMS10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#1a1205;color:#f0e6c8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
h1{font-size:26px;color:#d4a843;letter-spacing:1px;text-align:center;margin-bottom:6px;text-shadow:0 2px 8px #0008}
.sub{font-size:13px;color:#a89060;font-style:italic;text-align:center;margin-bottom:14px}
.divider{width:100%;max-width:460px;height:2px;background:linear-gradient(to right,transparent,#d4a843,transparent);margin-bottom:24px}
.card{background:#2c1f08;border:1px solid #5a3e1a;border-radius:12px;padding:22px;width:100%;max-width:460px;margin-bottom:16px;box-shadow:0 4px 20px #0006;text-align:center}
.card-title{font-size:11px;color:#a89060;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;font-family:sans-serif}
footer{margin-top:32px;font-size:10px;color:#4a3a1a;font-family:sans-serif;text-align:center}
.badge{display:inline-block;padding:6px 16px;border:1px solid #d4a843;border-radius:20px;font-size:12px;color:#d4a843;font-family:sans-serif;margin-top:8px}

.lock{font-size:64px;margin:16px 0}
.coming{font-size:15px;color:#8a7050;font-style:italic}
</style>
</head>
<body>
<h1>⚔ JeuMS10 ⚔</h1>
<p class="sub">Soirée médiévale</p>
<div class="divider"></div>
<div class="card">
  <div class="card-title">Énigme 5</div>
  <div class="lock">🔒</div>
  <p class="coming">Cette énigme n'est pas encore disponible.</p>
  <div class="badge">À venir</div>
</div>
<footer>Soirée médiévale • JeuMS10 • Énigme 5</footer>
</body>
</html>
