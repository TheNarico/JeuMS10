<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megasouye 10 — Jeu 1 : Le Mastermind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Simonetta:ital@0;1&family=Andada+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bordeaux:#962F24; --rougeclair:#c14a35; --or:#EDA02A; --orclair:#f0c25c;
    --creme:#EED9A8; --cremeclair:#faeed2; --vertf:#4A7A3E; --vertc:#6DB35B;
    --bleu:#293468; --bordure:#c8a060;
    --c-vert:#4A7A3E; --c-bleu:#293468; --c-orange:#EDA02A;
    --c-blanc:#f4ecd8; --c-violet:#7d5ba6; --c-rouge:#962F24;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'Andada Pro',serif; color:var(--bordeaux);
    min-height:100vh; padding:22px 14px 40px;
    background:linear-gradient(160deg,var(--bordeaux) 0%,var(--rougeclair) 35%,var(--or) 70%,var(--creme) 100%);
    background-attachment:fixed;
    display:flex; flex-direction:column; align-items:center;
  }
  .card{
    background:var(--cremeclair);
    border:2px solid var(--bordure);
    border-radius:14px;
    box-shadow:0 8px 28px rgba(80,30,10,.45);
    max-width:600px; width:100%; padding:26px 20px 30px; text-align:center;
    background-image:repeating-linear-gradient(0deg,rgba(200,160,96,.06) 0 1px,transparent 1px 26px);
  }
  .badge{
    display:inline-block; font-family:'Simonetta',serif; font-size:.9rem;
    color:var(--cremeclair); background:var(--vertf);
    padding:5px 16px; border-radius:20px; margin-bottom:14px; letter-spacing:.5px;
  }
  h1{font-family:'UnifrakturCook',cursive; font-size:2.4rem; color:var(--bordeaux); line-height:1.1; margin-bottom:14px;}
  .hr{height:2px; background:linear-gradient(90deg,transparent,var(--bordure),transparent); margin:18px 0;}

  .board{display:flex; flex-direction:column; gap:8px; margin:6px 0 4px;}
  .row{
    display:flex; align-items:center; gap:8px;
    background:#fffdf6; border:1px solid #e0c896; border-radius:12px;
    padding:7px 10px; box-shadow:0 1px 3px rgba(120,80,30,.12);
  }
  .pegs{display:flex; gap:5px; flex:1; justify-content:center;}
  .peg{
    width:30px; height:30px; border-radius:50%;
    box-shadow:inset 0 -2px 4px rgba(0,0,0,.22), inset 0 2px 3px rgba(255,255,255,.35), 0 1px 2px rgba(0,0,0,.2);
    border:1.5px solid rgba(80,50,20,.35);
  }
  @media (min-width:380px){ .peg{width:34px;height:34px;} }
  .peg.vert{background:var(--c-vert);}
  .peg.bleu{background:var(--c-bleu);}
  .peg.orange{background:var(--c-orange);}
  .peg.blanc{background:var(--c-blanc);}
  .peg.violet{background:var(--c-violet);}
  .peg.rouge{background:var(--c-rouge);}

  .hint{
    display:grid; grid-template-columns:repeat(3,10px); grid-template-rows:repeat(2,10px);
    gap:3px; flex-shrink:0; width:36px;
  }
  .dot{width:10px; height:10px; border-radius:50%;}
  .dot.black{background:#2a2018; box-shadow:inset 0 0 0 1px rgba(0,0,0,.3);}
  .dot.white{background:#fffdf6; box-shadow:inset 0 0 0 1.5px #9a7b3e;}
  .dot.empty{background:transparent;}

  .legend-note{font-size:.85rem; color:#6a4f1e; margin:8px 0 2px;}
  .legend-note .lg{display:inline-flex;align-items:center;gap:4px;margin:0 6px;}
  .mini{width:13px;height:13px;border-radius:50%;display:inline-block;}
  .mini.black{background:#2a2018;}
  .mini.white{background:#fff;border:1.5px solid #9a7b3e;}

  .solve{margin-top:18px;}
  .solve h2{font-family:'Simonetta',serif; font-style:italic; color:var(--vertf); font-size:1.15rem; margin-bottom:10px;}
  .selectors{display:flex; gap:6px; justify-content:center; flex-wrap:wrap;}
  .selwrap{display:flex; flex-direction:column; align-items:center; gap:4px;}
  .swatch{
    width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(80,50,20,.35);
    box-shadow:inset 0 -2px 4px rgba(0,0,0,.2);
    background:#ddd;
  }
  select{
    font-family:'Andada Pro',serif; font-size:.85rem; padding:3px 4px;
    border:1.5px solid var(--bordure); border-radius:7px; background:#fffdf6; color:var(--bordeaux);
    max-width:74px;
  }

  .btn{
    font-family:'Simonetta',serif; font-size:1.15rem; letter-spacing:.5px;
    color:var(--cremeclair); background:var(--bordeaux);
    border:2px solid var(--bordure); border-radius:10px;
    padding:12px 30px; cursor:pointer; margin-top:18px;
    transition:transform .08s ease, background .2s ease;
  }
  .btn:hover{background:var(--rougeclair);}
  .btn:active{transform:scale(.97);}
  .feedback{min-height:26px; margin-top:14px; font-size:1.1rem; font-weight:600;}
  .feedback.ko{color:var(--rougeclair);}
  .feedback.partial{color:#a8761e;}

  .indice{display:none; margin-top:18px; padding:18px 16px; background:linear-gradient(180deg,#fff6e0,#f6e6bf); border:2px solid var(--vertf); border-radius:12px;}
  .indice.show{display:block; animation:pop .4s ease;}
  @keyframes pop{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
  .indice .crest{font-size:1.8rem; margin-bottom:6px;}
  .indice .lbl{font-family:'Simonetta',serif; font-style:italic; color:var(--vertf); font-size:1rem; margin-bottom:6px;}
  .indice .val{font-family:'UnifrakturCook',cursive; font-size:1.8rem; color:var(--bordeaux); letter-spacing:1px; word-break:break-word;}

  @media (max-width:420px){
    h1{font-size:2.1rem;}
    .peg{width:28px;height:28px;}
  }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">⚔ Megasouye 10 — Jeu 1 ⚔</span>
    <h1>Le Mastermind</h1>

    <p class="legend-note">
      <span class="lg"><span class="mini black"></span> bonne couleur, bien placée</span>
      <span class="lg"><span class="mini white"></span> bonne couleur, mal placée</span>
    </p>

    <div class="board" id="board"></div>

    <div class="solve">
      <h2>Indique ta réponse</h2>
      <div class="selectors" id="selectors"></div>
      <button class="btn" id="check">Vérifier</button>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="indice" id="indice">
      <div class="crest">🗝️</div>
      <div class="lbl">Ton indice pour la quête finale :</div>
      <div class="val">A definir</div>
    </div>

    <div class="hr"></div>
    <p style="font-size:.8rem;color:var(--vertf);font-style:italic;">Note ton indice pour la validation.</p>
  </div>

<script>
const COLORS = [
  {id:"vert",   label:"Vert"},
  {id:"bleu",   label:"Bleu"},
  {id:"orange", label:"Orange"},
  {id:"blanc",  label:"Blanc"},
  {id:"violet", label:"Violet"},
  {id:"rouge",  label:"Rouge"}
];
const SLOTS = 6;
const SOLUTION_HASH = "36073f9d80accefb57eb3bc943e1243b38e83cfb065e727c26c75f5cc24eec4d";

const ROWS = [
  {colors:["blanc","orange","rouge","vert","violet","bleu"],   black:1, white:5},
  {colors:["blanc","vert","orange","blanc","violet","blanc"],  black:3, white:1},
  {colors:["vert","bleu","vert","violet","blanc","bleu"],      black:2, white:2},
  {colors:["orange","orange","orange","bleu","rouge","blanc"], black:1, white:3},
  {colors:["orange","violet","rouge","bleu","bleu","rouge"],   black:1, white:3},
  {colors:["bleu","rouge","bleu","orange","blanc","vert"],     black:0, white:5},
  {colors:["bleu","rouge","vert","rouge","rouge","orange"],    black:0, white:4}
];

const board = document.getElementById("board");
ROWS.forEach(row=>{
  const r = document.createElement("div"); r.className="row";
  const pegs = document.createElement("div"); pegs.className="pegs";
  row.colors.forEach(c=>{
    const p = document.createElement("div"); p.className="peg "+c; pegs.appendChild(p);
  });
  const hint = document.createElement("div"); hint.className="hint";
  let dots = [];
  for(let i=0;i<row.black;i++) dots.push("black");
  for(let i=0;i<row.white;i++) dots.push("white");
  while(dots.length<6) dots.push("empty");
  dots.forEach(d=>{
    const dot=document.createElement("div");
    dot.className = "dot" + (d==="black"?" black":(d==="white"?" white":""));
    hint.appendChild(dot);
  });
  r.appendChild(pegs); r.appendChild(hint);
  board.appendChild(r);
});

const selectors = document.getElementById("selectors");
const selects = [];
for(let i=0;i<SLOTS;i++){
  const wrap=document.createElement("div"); wrap.className="selwrap";
  const sw=document.createElement("div"); sw.className="swatch";
  const sel=document.createElement("select");
  const opt0=document.createElement("option"); opt0.value=""; opt0.textContent="—"; sel.appendChild(opt0);
  COLORS.forEach(col=>{
    const o=document.createElement("option"); o.value=col.id; o.textContent=col.label; sel.appendChild(o);
  });
  sel.addEventListener("change",()=>{
    const v=sel.value;
    sw.style.background = v ? getComputedStyle(document.documentElement).getPropertyValue("--c-"+v) : "#ddd";
    const f=document.getElementById("feedback"); f.textContent=""; f.className="feedback";
  });
  wrap.appendChild(sw); wrap.appendChild(sel);
  selectors.appendChild(wrap);
  selects.push(sel);
}

async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

document.getElementById("check").addEventListener("click", async ()=>{
  const fb=document.getElementById("feedback");
  const vals = selects.map(s=>s.value);
  if(vals.some(v=>v==="")){
    fb.textContent="Choisis une couleur pour chaque position.";
    fb.className="feedback partial"; fb.style.color="";
    return;
  }
  const map={vert:"VERT",bleu:"BLEU",orange:"ORANGE",blanc:"BLANC",violet:"VIOLET",rouge:"ROUGE"};
  const canon = vals.map(v=>map[v]).join("-");
  const h = await sha256(canon);
  if(h===SOLUTION_HASH){
    fb.textContent="✅ Tu as percé le secret !";
    fb.className="feedback"; fb.style.color="var(--vertf)";
    const ind=document.getElementById("indice"); ind.classList.add("show");
    ind.scrollIntoView({behavior:"smooth",block:"center"});
  } else {
    fb.textContent="❌ Ce n'est pas la bonne combinaison. Déduis encore.";
    fb.className="feedback ko"; fb.style.color="";
  }
});
</script>
</body>
</html>
